name: Health Monitor

on:
  schedule:
    # Every 15 minutes
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        env:
          - name: prod
            url: https://www.hitcf.com
            api: https://api.hitcf.com
          - name: dev
            url: https://dev.hitcf.com
            api: https://api-dev.hitcf.com
    steps:
      - name: Check site reachable
        id: site
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ matrix.env.url }}" --max-time 15 -L || echo "000")
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          if [ "$STATUS" != "200" ]; then
            echo "::error::[${{ matrix.env.name }}] Site returned HTTP $STATUS"
          fi

      - name: Check NextAuth
        id: auth
        run: |
          STATUS=$(curl -s -o /tmp/auth -w "%{http_code}" "${{ matrix.env.url }}/api/auth/providers" --max-time 10 -L || echo "000")
          BODY=$(cat /tmp/auth 2>/dev/null || echo "")
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          if [ "$STATUS" = "404" ]; then
            echo "::error::[${{ matrix.env.name }}] CRITICAL: /api/auth/providers 404 — login is broken!"
            echo "body=${BODY:0:100}" >> $GITHUB_OUTPUT
          elif ! echo "$BODY" | grep -q '"credentials"'; then
            echo "::warning::[${{ matrix.env.name }}] NextAuth HTTP $STATUS but no credentials provider"
          fi

      - name: Check backend API
        id: api
        run: |
          BODY=$(curl -s "${{ matrix.env.api }}/api/health" --max-time 10 -L || echo "")
          echo "body=${BODY:0:100}" >> $GITHUB_OUTPUT
          if echo "$BODY" | grep -q '"status":"ok"'; then
            echo "status=ok" >> $GITHUB_OUTPUT
          else
            echo "status=fail" >> $GITHUB_OUTPUT
            echo "::error::[${{ matrix.env.name }}] Backend /api/health failed: $BODY"
          fi

      - name: Send alert if any check failed
        if: |
          steps.site.outputs.status != '200' ||
          steps.auth.outputs.status == '404' ||
          steps.api.outputs.status == 'fail'
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
        run: |
          if [ -z "$RESEND_API_KEY" ] || [ -z "$NOTIFY_EMAIL" ]; then
            echo "No notification secrets, skipping email"
            exit 1
          fi

          ENV="${{ matrix.env.name }}"
          SITE_STATUS="${{ steps.site.outputs.status }}"
          AUTH_STATUS="${{ steps.auth.outputs.status }}"
          API_STATUS="${{ steps.api.outputs.status }}"
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          FAILURES=""
          [ "$SITE_STATUS" != "200" ] && FAILURES="$FAILURES<li>Site: HTTP $SITE_STATUS</li>"
          [ "$AUTH_STATUS" = "404" ] && FAILURES="$FAILURES<li><b>LOGIN BROKEN</b>: /api/auth/providers 404</li>"
          [ "$API_STATUS" = "fail" ] && FAILURES="$FAILURES<li>Backend API health check failed</li>"

          SUBJECT="🚨 [$ENV] HiTCF Health Alert"
          BODY="<div style='font-family:sans-serif'>
            <h2 style='color:#ef4444'>🚨 Health Check Failed — $ENV</h2>
            <ul>$FAILURES</ul>
            <p><a href='$RUN_URL'>View details</a></p>
            <p style='color:#888;font-size:12px'>$(date -u '+%Y-%m-%d %H:%M UTC')</p>
          </div>"

          curl -s -X POST https://api.resend.com/emails \
            -H "Authorization: Bearer ${RESEND_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg from "HiTCF Monitor <noreply@hitcf.com>" \
              --arg to "$NOTIFY_EMAIL" \
              --arg subject "$SUBJECT" \
              --arg html "$BODY" \
              '{from: $from, to: [$to], subject: $subject, html: $html}')"

          echo "Alert email sent"
          exit 1

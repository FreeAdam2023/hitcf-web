name: Health Monitor

on:
  schedule:
    # Every 15 minutes
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    # Only monitor prod — dev is behind Cloudflare Access (returns HTML login page)
    env:
      ENV_NAME: prod
      SITE_URL: https://www.hitcf.com
      API_URL: https://api.hitcf.com
    steps:
      - name: Check site reachable
        id: site
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$SITE_URL" --max-time 15 -L || echo "000")
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          if [ "$STATUS" != "200" ]; then
            echo "::error::[$ENV_NAME] Site returned HTTP $STATUS"
          fi

      - name: Check NextAuth
        id: auth
        run: |
          STATUS=$(curl -s -o /tmp/auth -w "%{http_code}" "$SITE_URL/api/auth/providers" --max-time 10 -L || echo "000")
          BODY=$(cat /tmp/auth 2>/dev/null || echo "")
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          if [ "$STATUS" = "404" ]; then
            echo "::error::[$ENV_NAME] CRITICAL: /api/auth/providers 404 — login is broken!"
            echo "body=${BODY:0:100}" >> $GITHUB_OUTPUT
          elif ! echo "$BODY" | grep -q '"credentials"'; then
            echo "::warning::[$ENV_NAME] NextAuth HTTP $STATUS but no credentials provider"
          fi

      - name: Check backend API
        id: api
        run: |
          BODY=$(curl -s "$API_URL/api/health" --max-time 10 -L || echo "")
          echo "body=${BODY:0:100}" >> $GITHUB_OUTPUT
          if echo "$BODY" | grep -q '"status"[[:space:]]*:[[:space:]]*"ok"'; then
            echo "status=ok" >> $GITHUB_OUTPUT
          else
            echo "status=fail" >> $GITHUB_OUTPUT
            echo "::error::[$ENV_NAME] Backend /api/health failed: $BODY"
          fi

      - name: Check cooldown (1 alert per hour max)
        id: cooldown
        if: |
          steps.site.outputs.status != '200' ||
          steps.auth.outputs.status == '404' ||
          steps.api.outputs.status == 'fail'
        uses: actions/cache@v4
        with:
          path: /tmp/health-alert-sent
          key: health-alert-${{ hashFiles('/dev/null') }}-${{ github.run_id }}
          restore-keys: health-alert-

      - name: Send alert if check failed and not recently alerted
        if: |
          (steps.site.outputs.status != '200' ||
           steps.auth.outputs.status == '404' ||
           steps.api.outputs.status == 'fail')
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
        run: |
          # Cooldown: skip if alert was sent within the last hour
          if [ -f /tmp/health-alert-sent ]; then
            LAST=$(cat /tmp/health-alert-sent)
            NOW=$(date +%s)
            DIFF=$((NOW - LAST))
            if [ "$DIFF" -lt 3600 ]; then
              echo "Alert sent ${DIFF}s ago, cooldown active (1h). Skipping email."
              exit 0
            fi
          fi

          if [ -z "$RESEND_API_KEY" ] || [ -z "$NOTIFY_EMAIL" ]; then
            echo "No notification secrets, skipping email"
            exit 0
          fi

          SITE_STATUS="${{ steps.site.outputs.status }}"
          AUTH_STATUS="${{ steps.auth.outputs.status }}"
          API_STATUS="${{ steps.api.outputs.status }}"
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          FAILURES=""
          [ "$SITE_STATUS" != "200" ] && FAILURES="$FAILURES<li>Site: HTTP $SITE_STATUS</li>"
          [ "$AUTH_STATUS" = "404" ] && FAILURES="$FAILURES<li><b>LOGIN BROKEN</b>: /api/auth/providers 404</li>"
          [ "$API_STATUS" = "fail" ] && FAILURES="$FAILURES<li>Backend API health check failed</li>"

          SUBJECT="🚨 [$ENV_NAME] HiTCF Health Alert"
          BODY="<div style='font-family:sans-serif'>
            <h2 style='color:#ef4444'>🚨 Health Check Failed — $ENV_NAME</h2>
            <ul>$FAILURES</ul>
            <p><a href='$RUN_URL'>View details</a></p>
            <p style='color:#888;font-size:12px'>$(date -u '+%Y-%m-%d %H:%M UTC')</p>
          </div>"

          curl -s -X POST https://api.resend.com/emails \
            -H "Authorization: Bearer ${RESEND_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg from "HiTCF Monitor <noreply@hitcf.com>" \
              --arg to "$NOTIFY_EMAIL" \
              --arg subject "$SUBJECT" \
              --arg html "$BODY" \
              '{from: $from, to: [$to], subject: $subject, html: $html}')"

          # Record timestamp for cooldown
          date +%s > /tmp/health-alert-sent
          echo "Alert email sent"

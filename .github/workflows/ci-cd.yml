name: Build & Deploy

on:
  push:
    branches: [main, dev]
    paths-ignore:
      - "CHANGELOG.md"
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: false

env:
  ACR_REGISTRY: tomtroveacr.azurecr.io
  IMAGE_NAME: hitcf-web

# BACKEND_URL is NO LONGER injected at build time.
# Next.js standalone reads process.env.BACKEND_URL at runtime from Azure App Settings.
# This means the same Docker image works for any environment — just set the Azure env var.
# Required Azure App Settings per environment:
#   hitcf-web-dev:  BACKEND_URL=https://hitcf-backend-dev.azurewebsites.net
#   hitcf-web-prod: BACKEND_URL=https://api.hitcf.com

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  # ── Gate: verify dev is healthy before deploying to prod ──
  verify-dev:
    if: github.ref_name == 'main'
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - name: Verify latest dev deployment succeeded
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RESULT=$(gh api "repos/${{ github.repository }}/actions/workflows/ci-cd.yml/runs?branch=dev&per_page=5" \
            --jq '[.workflow_runs[] | select(.status == "completed")] | .[0] | {conclusion, html_url, created_at}' 2>/dev/null || echo '{}')

          CONCLUSION=$(echo "$RESULT" | jq -r '.conclusion // "none"')
          RUN_URL=$(echo "$RESULT" | jq -r '.html_url // "N/A"')

          echo "Latest completed dev workflow: $CONCLUSION ($RUN_URL)"

          if [ "$CONCLUSION" != "success" ]; then
            echo "::error::Latest dev deployment did not succeed (status: $CONCLUSION). Fix dev first."
            exit 1
          fi

      - name: Smoke test dev environment
        run: |
          DEV_URL="https://hitcf-web-dev-fzb6cubsg6eugsaf.canadacentral-01.azurewebsites.net"
          FAILED=0

          echo "===== Smoke testing dev: $DEV_URL ====="

          # 1. Site reachable
          echo "--- Site Check ---"
          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$DEV_URL" --max-time 15 -L || echo "000")
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              break
            fi
            sleep 5
          done
          if [ "$STATUS" != "200" ]; then
            echo "::error::Dev site not reachable ($STATUS)"
            FAILED=1
          fi

          # 2. NextAuth providers
          echo "--- NextAuth ---"
          STATUS=$(curl -s -o /tmp/auth -w "%{http_code}" "$DEV_URL/api/auth/providers" --max-time 10 -L || echo "000")
          echo "GET /api/auth/providers → $STATUS"
          if [ "$STATUS" = "404" ]; then
            echo "::error::NextAuth routes broken (404) — routes are being proxied to backend!"
            FAILED=1
          elif [ "$STATUS" = "200" ]; then
            if grep -q '"google"\|"credentials"' /tmp/auth; then
              echo "NextAuth providers OK"
            else
              echo "::warning::No known providers in response"
            fi
          fi

          # 3. API proxy not hitting Cloudflare Access (validates Azure BACKEND_URL setting)
          echo "--- API Proxy ---"
          HEALTH=$(curl -s "$DEV_URL/api/health" --max-time 10 -L || echo "")
          echo "API health: ${HEALTH:0:200}"
          if echo "$HEALTH" | grep -q "Cloudflare Access"; then
            echo "::error::API proxy hitting Cloudflare Access — Azure BACKEND_URL is wrong!"
            FAILED=1
          elif echo "$HEALTH" | grep -q '"status"'; then
            echo "API proxy OK"
          else
            echo "::warning::API health did not return ok (backend may be down)"
          fi

          echo "====================================="
          if [ "$FAILED" -eq 1 ]; then
            echo "::error::Dev smoke tests FAILED — fix dev before deploying to prod"
            exit 1
          fi
          echo "All dev smoke tests passed ✓"

  deploy:
    needs: [lint, test, verify-dev]
    if: |
      always() &&
      needs.lint.result == 'success' &&
      needs.test.result == 'success' &&
      (needs.verify-dev.result == 'success' || needs.verify-dev.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify main comes from dev
        if: github.ref_name == 'main'
        run: |
          git fetch origin dev
          # List commits on main but not dev, excluding auto-generated CHANGELOG commits
          EXTRA=$(git log origin/dev..HEAD --oneline --no-merges \
            --invert-grep --grep="chore: update CHANGELOG" --grep="chore: sync CHANGELOG" || true)
          if [ -n "$EXTRA" ]; then
            echo "::error::Rejected: main contains non-CHANGELOG commits not on origin/dev:"
            echo "$EXTRA"
            echo "::error::Push dev first."
            exit 1
          fi

      - name: Set environment variables
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "ENV_TAG=prod" >> $GITHUB_ENV
            echo "WEBAPP_NAME=hitcf-web-prod" >> $GITHUB_ENV
          else
            echo "ENV_TAG=dev" >> $GITHUB_ENV
            echo "WEBAPP_NAME=hitcf-web-dev" >> $GITHUB_ENV
          fi

      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v2
        with:
          login-server: ${{ env.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        run: |
          docker build -t ${{ env.ACR_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.ENV_TAG }} \
                       -t ${{ env.ACR_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} .
          docker push ${{ env.ACR_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.ENV_TAG }}
          docker push ${{ env.ACR_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.WEBAPP_NAME }}
          publish-profile: ${{ github.ref_name == 'main' && secrets.AZURE_WEBAPP_PUBLISH_PROFILE_PROD || secrets.AZURE_WEBAPP_PUBLISH_PROFILE_DEV }}
          images: ${{ env.ACR_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

  smoke-test:
    needs: [deploy]
    runs-on: ubuntu-latest
    steps:
      - name: Set URLs
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "SITE_URL=https://www.hitcf.com" >> $GITHUB_ENV
            echo "FORBIDDEN_API=api-dev.hitcf.com" >> $GITHUB_ENV
          else
            echo "SITE_URL=https://hitcf-web-dev-fzb6cubsg6eugsaf.canadacentral-01.azurewebsites.net" >> $GITHUB_ENV
            echo "FORBIDDEN_API=api.hitcf.com" >> $GITHUB_ENV
          fi

      - name: Wait for container startup
        run: sleep 90

      - name: Check site is reachable
        run: |
          for i in 1 2 3 4 5 6; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$SITE_URL" --max-time 15 -L || echo "000")
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Site is up"
              exit 0
            fi
            sleep 15
          done
          echo "::error::Site health check failed after 6 attempts"
          exit 1

      - name: Verify NextAuth routes are not proxied
        run: |
          AUTH_STATUS=$(curl -s -o /tmp/auth_body -w "%{http_code}" "$SITE_URL/api/auth/providers" --max-time 10 -L || echo "000")
          AUTH_BODY=$(cat /tmp/auth_body 2>/dev/null || echo "")
          echo "NextAuth providers: HTTP $AUTH_STATUS"
          echo "Response body (first 200 chars): ${AUTH_BODY:0:200}"

          if [ "$AUTH_STATUS" = "404" ]; then
            echo "::error::CRITICAL: /api/auth/providers returned 404 — NextAuth routes are being proxied to backend!"
            echo "::error::Check next.config.mjs rewrite rules: /api/auth/* must NOT be proxied."
            exit 1
          fi

          if echo "$AUTH_BODY" | grep -q '"google"'; then
            echo "NextAuth providers OK (Google provider found)"
          elif echo "$AUTH_BODY" | grep -q '"credentials"'; then
            echo "NextAuth providers OK (Credentials provider found)"
          else
            echo "::warning::NextAuth /api/auth/providers returned HTTP $AUTH_STATUS but no known providers in response"
          fi

      - name: Verify API proxy to correct backend
        run: |
          HEALTH_BODY=$(curl -s "$SITE_URL/api/health" --max-time 10 -L || echo "")
          echo "API health response: ${HEALTH_BODY:0:300}"

          # HARD FAIL: Cloudflare Access page means BACKEND_URL Azure env var is wrong
          if echo "$HEALTH_BODY" | grep -q "Cloudflare Access"; then
            echo "::error::CRITICAL: API proxy is hitting Cloudflare Access!"
            echo "::error::The Azure App Setting BACKEND_URL is pointing to a Cloudflare Access-protected URL."
            echo "::error::Fix BACKEND_URL in Azure Portal for ${{ github.ref_name == 'main' && 'hitcf-web-prod' || 'hitcf-web-dev' }}."
            exit 1
          fi

          if echo "$HEALTH_BODY" | grep -q '"status"'; then
            echo "API health OK — proxy is working correctly"
          else
            echo "::warning::API health did not return ok (backend may be restarting)"
          fi

          # Cross-environment contamination check (page source)
          PAGE_BODY=$(curl -s "$SITE_URL" --max-time 10 -L || echo "")
          if echo "$PAGE_BODY" | grep -q "$FORBIDDEN_API"; then
            echo "::error::CRITICAL: ${{ github.ref_name }} build references wrong backend ($FORBIDDEN_API)!"
            exit 1
          fi
          echo "No cross-environment contamination detected"

  notify-success:
    needs: [lint, test, verify-dev, deploy, smoke-test]
    if: success()
    runs-on: ubuntu-latest
    steps:
      - name: Send success notification
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
        run: |
          if [ -z "$RESEND_API_KEY" ] || [ -z "$NOTIFY_EMAIL" ]; then exit 0; fi
          REPO="${{ github.repository }}"
          BRANCH="${{ github.ref_name }}"
          COMMIT="${{ github.event.head_commit.message }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          SUBJECT="✅ ${REPO##*/} (${BRANCH}) deployed"
          BODY="<div style='font-family:sans-serif'><h3 style='color:#16a34a'>✅ Deploy Success</h3><p><b>Repo:</b> ${REPO}<br><b>Branch:</b> ${BRANCH}</p><p><b>Commit:</b> ${COMMIT}</p><p><a href='${RUN_URL}'>View run</a></p></div>"
          curl -s -X POST https://api.resend.com/emails \
            -H "Authorization: Bearer ${RESEND_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg from "HiTCF CI/CD <noreply@hitcf.com>" --arg to "$NOTIFY_EMAIL" --arg subject "$SUBJECT" --arg html "$BODY" '{from: $from, to: [$to], subject: $subject, html: $html}')"

  notify-failure:
    needs: [lint, test, verify-dev, deploy, smoke-test]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Send failure notification
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
        run: |
          if [ -z "$RESEND_API_KEY" ] || [ -z "$NOTIFY_EMAIL" ]; then
            echo "Notification secrets not configured, skipping"
            exit 0
          fi

          REPO="${{ github.repository }}"
          BRANCH="${{ github.ref_name }}"
          COMMIT="${{ github.event.head_commit.message }}"
          SHA="${{ github.sha }}"
          SHORT_SHA="${SHA:0:7}"
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          LINT="${{ needs.lint.result }}"
          TEST="${{ needs.test.result }}"
          VERIFY_DEV="${{ needs.verify-dev.result }}"
          DEPLOY="${{ needs.deploy.result }}"
          SMOKE="${{ needs.smoke-test.result }}"

          SUBJECT="❌ ${REPO} (${BRANCH}) deployment failed"

          BODY="<div style='font-family:sans-serif;max-width:600px'>
            <h2 style='color:#ef4444'>${SUBJECT}</h2>
            <table style='border-collapse:collapse;width:100%'>
              <tr><td style='padding:4px 12px;font-weight:bold'>Branch</td><td>${BRANCH}</td></tr>
              <tr><td style='padding:4px 12px;font-weight:bold'>Commit</td><td>${SHORT_SHA} — ${COMMIT}</td></tr>
              <tr><td style='padding:4px 12px;font-weight:bold'>Lint</td><td>${LINT}</td></tr>
              <tr><td style='padding:4px 12px;font-weight:bold'>Test</td><td>${TEST}</td></tr>
              <tr><td style='padding:4px 12px;font-weight:bold'>Verify Dev</td><td>${VERIFY_DEV}</td></tr>
              <tr><td style='padding:4px 12px;font-weight:bold'>Deploy</td><td>${DEPLOY}</td></tr>
              <tr><td style='padding:4px 12px;font-weight:bold'>Smoke Test</td><td>${SMOKE}</td></tr>
            </table>
            <p><a href='${RUN_URL}'>View workflow run</a></p>
          </div>"

          curl -s -X POST https://api.resend.com/emails \
            -H "Authorization: Bearer ${RESEND_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg from "HiTCF CI/CD <noreply@hitcf.com>" \
              --arg to "$NOTIFY_EMAIL" \
              --arg subject "$SUBJECT" \
              --arg html "$BODY" \
              '{from: $from, to: [$to], subject: $subject, html: $html}')"

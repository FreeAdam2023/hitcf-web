name: Build & Deploy

on:
  push:
    branches: [main, dev]
  workflow_dispatch:

env:
  ACR_REGISTRY: tomtroveacr.azurecr.io
  IMAGE_NAME: hitcf-web

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  deploy:
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify main comes from dev
        if: github.ref_name == 'main'
        run: |
          git fetch origin dev
          if ! git merge-base --is-ancestor origin/dev HEAD; then
            echo "::error::Rejected: main contains commits not on origin/dev. Push dev first."
            exit 1
          fi

      - name: Set environment variables
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "ENV_TAG=prod" >> $GITHUB_ENV
            echo "WEBAPP_NAME=hitcf-web-prod" >> $GITHUB_ENV
            echo "BACKEND_URL=${{ secrets.BACKEND_URL_PROD }}" >> $GITHUB_ENV
            echo "EXPECTED_HOST=api.hitcf.com" >> $GITHUB_ENV
          else
            echo "ENV_TAG=dev" >> $GITHUB_ENV
            echo "WEBAPP_NAME=hitcf-web-dev" >> $GITHUB_ENV
            echo "BACKEND_URL=${{ secrets.BACKEND_URL_DEV }}" >> $GITHUB_ENV
            echo "EXPECTED_HOST=api-dev.hitcf.com" >> $GITHUB_ENV
          fi

      - name: Validate BACKEND_URL matches environment
        run: |
          if [ -z "$BACKEND_URL" ]; then
            echo "::error::BACKEND_URL is empty! Check GitHub secret BACKEND_URL_${{ github.ref_name == 'main' && 'PROD' || 'DEV' }}"
            exit 1
          fi
          if ! echo "$BACKEND_URL" | grep -q "$EXPECTED_HOST"; then
            echo "::error::BACKEND_URL ($BACKEND_URL) does not match expected host ($EXPECTED_HOST) for ${{ github.ref_name }} branch!"
            echo "::error::This would cause cross-environment contamination. Aborting."
            exit 1
          fi
          echo "BACKEND_URL validated: matches $EXPECTED_HOST for ${{ github.ref_name }}"

      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v2
        with:
          login-server: ${{ env.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        run: |
          docker build --build-arg BACKEND_URL=${{ env.BACKEND_URL }} \
                       -t ${{ env.ACR_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.ENV_TAG }} \
                       -t ${{ env.ACR_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} .
          docker push ${{ env.ACR_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.ENV_TAG }}
          docker push ${{ env.ACR_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.WEBAPP_NAME }}
          publish-profile: ${{ github.ref_name == 'main' && secrets.AZURE_WEBAPP_PUBLISH_PROFILE_PROD || secrets.AZURE_WEBAPP_PUBLISH_PROFILE_DEV }}
          images: ${{ env.ACR_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

  smoke-test:
    needs: [deploy]
    runs-on: ubuntu-latest
    steps:
      - name: Set site URL and expected API host
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "SITE_URL=https://www.hitcf.com" >> $GITHUB_ENV
            echo "EXPECTED_API=api.hitcf.com" >> $GITHUB_ENV
            echo "FORBIDDEN_API=api-dev.hitcf.com" >> $GITHUB_ENV
          else
            echo "SITE_URL=https://dev.hitcf.com" >> $GITHUB_ENV
            echo "EXPECTED_API=api-dev.hitcf.com" >> $GITHUB_ENV
            echo "FORBIDDEN_API=api.hitcf.com" >> $GITHUB_ENV
          fi

      - name: Wait for container startup
        run: sleep 30

      - name: Check site is reachable
        run: |
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$SITE_URL" --max-time 10 -L || echo "000")
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Site is up"
              exit 0
            fi
            sleep 10
          done
          echo "::error::Site health check failed after 5 attempts"
          exit 1

      - name: Verify API proxies to correct backend
        run: |
          HEALTH_BODY=$(curl -s "$SITE_URL/api/health" --max-time 10 -L || echo "")
          echo "API health response: $HEALTH_BODY"
          if echo "$HEALTH_BODY" | grep -q '"status":"ok"'; then
            echo "API health OK"
          else
            echo "::warning::API health check did not return ok (may need auth)"
          fi

          # Ensure no cross-environment contamination
          PAGE_BODY=$(curl -s "$SITE_URL" --max-time 10 -L || echo "")
          if echo "$PAGE_BODY" | grep -q "$FORBIDDEN_API"; then
            echo "::error::CRITICAL: ${{ github.ref_name }} build references wrong backend ($FORBIDDEN_API)!"
            exit 1
          fi
          echo "No cross-environment contamination detected"

  notify:
    needs: [lint, test, deploy, smoke-test]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Send deployment notification
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
        run: |
          if [ -z "$RESEND_API_KEY" ] || [ -z "$NOTIFY_EMAIL" ]; then
            echo "Notification secrets not configured, skipping"
            exit 0
          fi

          REPO="${{ github.repository }}"
          BRANCH="${{ github.ref_name }}"
          COMMIT="${{ github.event.head_commit.message }}"
          SHA="${{ github.sha }}"
          SHORT_SHA="${SHA:0:7}"
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          LINT="${{ needs.lint.result }}"
          TEST="${{ needs.test.result }}"
          DEPLOY="${{ needs.deploy.result }}"
          SMOKE="${{ needs.smoke-test.result }}"

          if [ "$DEPLOY" = "success" ] && [ "$SMOKE" = "success" ]; then
            ICON="✅"
            SUBJECT="${ICON} ${REPO} (${BRANCH}) deployed successfully"
            COLOR="#22c55e"
          else
            ICON="❌"
            SUBJECT="${ICON} ${REPO} (${BRANCH}) deployment failed"
            COLOR="#ef4444"
          fi

          BODY="<div style='font-family:sans-serif;max-width:600px'>
            <h2 style='color:${COLOR}'>${SUBJECT}</h2>
            <table style='border-collapse:collapse;width:100%'>
              <tr><td style='padding:4px 12px;font-weight:bold'>Repo</td><td>${REPO}</td></tr>
              <tr><td style='padding:4px 12px;font-weight:bold'>Branch</td><td>${BRANCH}</td></tr>
              <tr><td style='padding:4px 12px;font-weight:bold'>Commit</td><td>${SHORT_SHA} — ${COMMIT}</td></tr>
              <tr><td style='padding:4px 12px;font-weight:bold'>Lint</td><td>${LINT}</td></tr>
              <tr><td style='padding:4px 12px;font-weight:bold'>Test</td><td>${TEST}</td></tr>
              <tr><td style='padding:4px 12px;font-weight:bold'>Deploy</td><td>${DEPLOY}</td></tr>
              <tr><td style='padding:4px 12px;font-weight:bold'>Smoke Test</td><td>${SMOKE}</td></tr>
            </table>
            <p><a href='${RUN_URL}'>View workflow run</a></p>
          </div>"

          curl -s -X POST https://api.resend.com/emails \
            -H "Authorization: Bearer ${RESEND_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg from "HiTCF CI/CD <noreply@hitcf.com>" \
              --arg to "$NOTIFY_EMAIL" \
              --arg subject "$SUBJECT" \
              --arg html "$BODY" \
              '{from: $from, to: [$to], subject: $subject, html: $html}')"

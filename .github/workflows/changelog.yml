name: Update CHANGELOG

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  changelog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate changelog entries
        run: |
          # Find the last changelog commit (if any)
          LAST_TAG=$(git log --all --oneline --grep="chore: update CHANGELOG" -1 --format="%H" 2>/dev/null || true)

          if [ -z "$LAST_TAG" ]; then
            # First run: take last 20 commits
            RANGE="HEAD~20..HEAD"
          else
            RANGE="${LAST_TAG}..HEAD"
          fi

          # Skip if the only commit is a changelog update
          COMMITS=$(git log "$RANGE" --oneline --no-merges --invert-grep --grep="chore: update CHANGELOG" 2>/dev/null || true)
          if [ -z "$COMMITS" ]; then
            echo "NO_CHANGES=true" >> "$GITHUB_ENV"
            exit 0
          fi

          DATE=$(date -u +"%Y-%m-%d")
          SHORT_SHA=$(git rev-parse --short HEAD)

          {
            echo "## ${DATE} (${SHORT_SHA})"
            echo ""
            # Group by conventional commit type
            for TYPE_LABEL in "feat:Features" "fix:Bug Fixes" "style:Style" "refactor:Refactor" "perf:Performance" "test:Tests" "ci:CI/CD" "docs:Docs" "chore:Chores"; do
              PREFIX="${TYPE_LABEL%%:*}"
              LABEL="${TYPE_LABEL##*:}"
              ITEMS=$(git log "$RANGE" --oneline --no-merges --invert-grep --grep="chore: update CHANGELOG" --format="- %s (%h)" | grep "^- ${PREFIX}" || true)
              if [ -n "$ITEMS" ]; then
                echo "### ${LABEL}"
                echo "$ITEMS" | sed "s/^- ${PREFIX}: /- /; s/^- ${PREFIX}(/- (/"
                echo ""
              fi
            done
            # Uncategorized
            OTHERS=$(git log "$RANGE" --oneline --no-merges --invert-grep --grep="chore: update CHANGELOG" --format="- %s (%h)" | grep -v "^- feat" | grep -v "^- fix" | grep -v "^- style" | grep -v "^- refactor" | grep -v "^- perf" | grep -v "^- test" | grep -v "^- ci" | grep -v "^- docs" | grep -v "^- chore" || true)
            if [ -n "$OTHERS" ]; then
              echo "### Other"
              echo "$OTHERS"
              echo ""
            fi
            echo "---"
            echo ""
          } > /tmp/new_entries.md

          # Prepend to existing CHANGELOG or create new
          if [ -f CHANGELOG.md ]; then
            cat /tmp/new_entries.md CHANGELOG.md > /tmp/merged.md
            mv /tmp/merged.md CHANGELOG.md
          else
            {
              echo "# Changelog"
              echo ""
              cat /tmp/new_entries.md
            } > CHANGELOG.md
          fi

          echo "NO_CHANGES=false" >> "$GITHUB_ENV"

      - name: Commit and push
        if: env.NO_CHANGES != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git diff --cached --quiet && exit 0
          git commit -m "chore: update CHANGELOG"
          # Uses GITHUB_TOKEN — requires PAT secret for repos with branch protection
          git push
